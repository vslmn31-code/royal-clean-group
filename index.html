<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Royal Clean Group</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(135deg,#08111f,#102b4c);
      color:white;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:25px 80px;
      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(10px);
    }

    .logo{
      font-size:32px;
      font-weight:bold;
      color:#d4a017;
    }

    .menu a{
      color:white;
      text-decoration:none;
      margin-left:30px;
      font-size:18px;
    }

    .hero{
      min-height:90vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px;
      background:
      radial-gradient(circle at right,#4fcbff55,transparent 30%);
    }

    .hero-box{
      max-width:900px;
    }

    h1{
      font-size:72px;
      margin-bottom:20px;
    }

    h1 span{
      color:#d4a017;
    }

    p{
      font-size:24px;
      color:#d6e7ff;
      margin-bottom:30px;
    }

    .btn{
      display:inline-block;
      margin:10px;
      padding:18px 35px;
      border-radius:50px;
      text-decoration:none;
      font-weight:bold;
    }

    .gold{
      background:#d4a017;
      color:black;
    }

    .blue{
      background:#4fcbff;
      color:black;
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">ROYAL CLEAN GROUP</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-box">
    <h1>ROYAL <span>CLEAN GROUP</span></h1>
    <p>Professional Cleaning with Premium Results</p>
    <a class="btn gold" href="#">Call Now</a>
    <a class="btn blue" href="#">WhatsApp</a>
  </div>
</section>

</body>
</html>
